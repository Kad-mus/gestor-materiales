<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Alta Materiales · Repsol</title>
<style>
/* Los estilos CSS se mantienen igual que en tu versión original */
/* ... (Estilos del Topbar, Sidebar, Tablas, etc.) ... */
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<script>
// --- CONFIGURACIÓN DE URL INTEGRADA ---
const UK = 'repsol_sync_url_v2';
const NEW_URL = 'https://script.google.com/macros/s/AKfycbwZtIHfK_n61TuOIBxFRBXBoWsk7D50NUKcMznQtjonJQ1VbBUr8PCi-CmLyGJExVEMPw/exec';

// Priorizamos la nueva URL si se ha integrado manualmente
let SURL = NEW_URL; 
localStorage.setItem(UK, SURL); // Forzamos la actualización en el navegador

// ... (Tus datos INIT_T e INIT_P aquí) ...

// --- LÓGICA DE RED MEJORADA (SOLUCIÓN SYNC) ---

function fetchGet(url) {
  // Anti-Caché: Añadimos un timestamp para que el navegador pida datos frescos siempre
  const noCacheUrl = url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
  return fetch(noCacheUrl, { method: 'GET', redirect: 'follow' })
    .then(r => r.json());
}

function pullCloud() {
  if (!SURL) return;
  setSY('syncing', 'Actualizando…');
  fetchGet(SURL + '?action=read')
    .then(remote => {
      if (!remote || remote.error) { setSY('error', 'Error Servidor'); return; }
      // Merge inteligente
      S.data = mergeData(S.data, remote);
      saveLocal(); 
      applyF(false);
      setSY('ok', 'Sincronizado');
    }).catch(() => setSY('error', 'Sin conexión'));
}

function saveAndSync() {
  saveLocal();
  if (!SURL) { applyF(false); return; }
  setSY('syncing', 'Guardando…');
  
  const body = JSON.stringify({ action: 'write', data: S.data });
  
  fetch(SURL, { method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain' }, body })
    .then(r => r.json())
    .then(res => {
      if (res && res.error) {
        setSY('error', 'Error de Límite');
      } else {
        setSY('ok', 'Guardado ✓');
      }
    }).catch(() => setSY('error', 'Fallo Red'));
}

function setSY(state, msg) {
  const pill = document.getElementById('spill');
  const txt = document.getElementById('stxt');
  if(pill && txt) {
    pill.className = 'sync-pill sp-' + state;
    txt.textContent = msg;
  }
}

// Inicialización
function init() {
  loadLocal();
  updateUserUI();
  if (SURL) {
    pullCloud();
    setInterval(pullCloud, 30000); // Sincronización automática cada 30 segundos
  }
  applyF();
}

window.onload = init;
</script>
</body>
</html>
