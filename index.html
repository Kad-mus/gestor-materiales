<style>
/* ... Mantén tus estilos CSS iguales ... */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --repsol-red:    #DA291C;
  --repsol-orange: #FF6900;
  --repsol-dark:   #1A1A1A;
  --repsol-black:  #0D0D0D;
  --navy:    #0F1923;
  --navy2:   #1A2737;
  --ink:     #1C2333;
  --muted:   #64748B;
  --line:    #E2E8F0;
  --bg:      #F8F9FB;
  --white:   #FFFFFF;
  --orange-bg: #FFF4EE;
  --green:   #166534;
  --green-bg:#DCFCE7;
  --blue:    #1E40AF;
  --blue-bg: #DBEAFE;
  --mono:  'JetBrains Mono', monospace;
  --sans:  'Barlow', sans-serif;
  --cond:  'Barlow Condensed', sans-serif;
  --shadow-s: 0 1px 3px rgba(0,0,0,.08);
  --shadow-m: 0 4px 16px rgba(0,0,0,.10);
  --shadow-l: 0 20px 50px rgba(0,0,0,.18), 0 4px 12px rgba(0,0,0,.10);
  --grad: linear-gradient(135deg, var(--repsol-red), var(--repsol-orange));
}
html, body { height:100%; overflow:hidden; }
body { font-family:var(--sans); font-size:16px; background:var(--bg); color:var(--ink); display:flex; flex-direction:column; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#CBD5E1; border-radius:99px; }
#topbar { background: var(--navy); height: 60px; display: flex; align-items: center; padding: 0 28px; gap: 16px; flex-shrink: 0; position: relative; z-index: 100; border-bottom: 2px solid var(--repsol-red); box-shadow: 0 2px 20px rgba(0,0,0,.3); }
#topbar::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: var(--grad); }
.app-brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
@keyframes iconSpin { 0%{transform:rotate(0deg) scale(.7);opacity:0} 60%{transform:rotate(380deg) scale(1.1);opacity:1} 100%{transform:rotate(360deg) scale(1);opacity:1} }
.app-icon { width: 38px; height: 38px; flex-shrink: 0; filter: drop-shadow(0 2px 6px rgba(218,41,28,.4)); animation: iconSpin .9s cubic-bezier(.34,1.56,.64,1) both; }
.app-title { display: flex; flex-direction: column; line-height: 1.1; }
.app-name { font-family: var(--cond); font-weight: 700; font-size: 18px; letter-spacing: .06em; text-transform: uppercase; color: white; }
.app-sub { font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,.35); letter-spacing: .08em; text-transform: uppercase; }
.topbar-divider { width:1px; height:30px; background:rgba(255,255,255,.1); margin:0 6px; flex-shrink:0; }
#tabs-bar { display: flex; background: var(--navy); border-bottom: 2px solid rgba(255,105,0,.25); padding: 4px 16px; gap: 4px; flex-shrink: 0; }
.ttab { padding: 6px 22px; border: none; border-radius: 6px; background: transparent; color: rgba(255,255,255,.4); font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: .02em; transition: all .18s; white-space: nowrap; }
.ttab.on { background: var(--grad); color: white; box-shadow: 0 2px 8px rgba(218,41,28,.35); }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.sync-pill { display:flex; align-items:center; gap:6px; padding:5px 13px; border-radius:99px; font-size:12px; font-weight:600; border:1px solid transparent; transition:all .3s; }
.sp-idle    { background:rgba(255,255,255,.06); color:rgba(255,255,255,.38); border-color:rgba(255,255,255,.09); }
.sp-syncing { background:rgba(255,105,0,.15);   color:#FFAA55;              border-color:rgba(255,105,0,.3); }
.sp-ok      { background:rgba(22,101,52,.25);   color:#4ADE80;              border-color:rgba(74,222,128,.2); }
.sp-error   { background:rgba(218,41,28,.2);    color:#FCA5A5;              border-color:rgba(218,41,28,.3); }
.sp-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.sp-syncing .sp-dot { background:#FF6900; animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
.btn { padding:6px 18px; border-radius:7px; font-family:var(--sans); font-size:14px; font-weight:600; cursor:pointer; border:none; transition:all .15s, transform .1s; white-space:nowrap; }
.btn-ghost { background:rgba(255,255,255,.08); color:rgba(255,255,255,.7); border:1px solid rgba(255,255,255,.12); }
.btn-primary { background:var(--grad); color:white; box-shadow:0 2px 8px rgba(218,41,28,.3); }
.user-chip { display:flex; align-items:center; gap:8px; padding:4px 13px 4px 5px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.11); border-radius:99px; cursor:pointer; }
.user-avatar { width:26px; height:26px; border-radius:50%; display:grid; place-items:center; font-size:11px; font-weight:700; color:white; }
#setup { background:var(--navy2); border-bottom:1px solid rgba(255,105,0,.2); overflow:hidden; max-height:220px; transition:max-height .4s cubic-bezier(.4,0,.2,1); }
#setup.closed { max-height:0; }
#setup-inner { padding:18px 28px; display:flex; align-items:flex-start; gap:18px; }
#setup-input { flex:1; padding:9px 13px; border-radius:7px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.07); color:white; font-family:var(--mono); }
#main { display:flex; flex:1; overflow:hidden; }
#sidebar { width:248px; background:var(--white); border-right:1px solid var(--line); display:flex; flex-direction:column; }
.sb-block { padding:16px 18px; border-bottom:1px solid var(--line); }
#content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#table-wrap { flex:1; overflow:auto; }
table { width:100%; border-collapse:collapse; font-size:15px; }
th { background: var(--navy); color: white; padding: 10px 14px; text-align: left; border-bottom: 2px solid var(--repsol-red); position:sticky; top:0; }
td { padding:9px 14px; border-bottom:1px solid #F1F5F9; }
tr:hover { background: #F8FAFC; }
.badge { padding:2px 7px; border-radius:99px; font-size:11px; font-weight:600; font-family:var(--mono); }
.bOK { background:var(--green-bg); color:var(--green); }
.bAN { background:#FEE2E2; color:#991B1B; }
.bPE { background:#FFF4EE; color:#C2410C; }
#modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); z-index:300; display:none; align-items:center; justify-content:center; }
#modal-overlay.open { display:flex; }
#modal { background:white; border-radius:14px; width:640px; overflow:hidden; }
</style>

<body>
<div id="topbar">
  <div class="app-brand">
    <div class="app-title">
      <span class="app-name">Control Alta Materiales</span>
      <span class="app-sub">Repsol · SAP · TAM4</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="sync-pill sp-idle" id="spill"><div class="sp-dot"></div><span id="stxt">Sin sync</span></div>
    <div class="user-chip" onclick="changeUser()"><div class="user-avatar" id="u-avatar">?</div><span class="user-name" id="u-name">—</span></div>
    <button class="btn btn-primary" onclick="openNew()">+ Nuevo</button>
  </div>
</div>
<div id="tabs-bar">
  <button class="ttab on" onclick="switchTab('trabajos')">Trabajos</button>
  <button class="ttab" onclick="switchTab('planificadores')">Planificadores</button>
</div>
<div id="setup">
  <div id="setup-inner">
    <div style="flex:1">
      <input id="setup-input" placeholder="URL del Google Script" oninput="onUrl(this)">
      <button id="setup-btn" class="btn btn-primary" onclick="connect()" disabled>Conectar</button>
    </div>
  </div>
</div>
<div id="main">
  <div id="sidebar">
    <div class="sb-block"><input class="sb-input" id="qInput" placeholder="Buscar..." oninput="applyF()"></div>
  </div>
  <div id="content">
    <div id="table-wrap"></div>
  </div>
</div>

<script>
// Lógica de Sincronización Mejorada
const LK='repsol_mat_v5', UK='repsol_sync_url_v2', UNKEY='repsol_username';
let SURL=localStorage.getItem(UK)||'';
let currentUser=localStorage.getItem(UNKEY)||'';

// --- NUEVA FUNCIÓN FETCH (EVITA CACHÉ) ---
function fetchGet(url){
  const separator = url.includes('?') ? '&' : '?';
  const noCacheUrl = url + separator + '_t=' + Date.now(); // Forzamos al navegador a ignorar la caché
  return fetch(noCacheUrl, {method:'GET', redirect:'follow'})
    .then(r=>r.json());
}

function pullCloud(){
  if(!SURL)return;
  setSY('syncing','Actualizando…');
  fetchGet(SURL+'?action=read')
    .then(remote=>{
      if(!remote || remote.error){ setSY('error','Error Servidor'); return; }
      S.data = mergeData(S.data, remote);
      saveLocal(); applyF(false);
      setSY('ok','Sincronizado');
    }).catch(()=>setSY('error','Sin conexión'));
}

function saveAndSync(){
  saveLocal();
  if(!SURL){ applyF(false); return; }
  setSY('syncing','Guardando…');
  const body=JSON.stringify({action:'write',data:S.data});
  fetch(SURL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body})
    .then(r=>r.json())
    .then(res=>{
      if(res && res.error) setSY('error','Error al guardar');
      else setSY('ok','Guardado ✓');
    }).catch(()=>setSY('error','Fallo Red'));
}

function setSY(state,msg){
  document.getElementById('spill').className='sync-pill sp-'+state;
  document.getElementById('stxt').textContent=msg;
}

// ... (Resto de tu lógica de renderizado de tablas, filtros y modales igual)
// Nota: He resumido el código para que quepan los cambios críticos.
// Simplemente asegúrate de usar las funciones fetchGet y saveAndSync anteriores.

let S={tab:'trabajos',data:{trabajos:[],planificadores:[],notes:{}},filtered:[],selId:null,page:0,pageSize:16};
function loadLocal(){try{const r=localStorage.getItem(LK);if(r)S.data=JSON.parse(r);}catch(e){}}
function saveLocal(){localStorage.setItem(LK,JSON.stringify(S.data));}
function applyF(){ S.filtered = S.data[S.tab]; renderTable(); }

function renderTable(){
  const wrap = document.getElementById('table-wrap');
  let html = '<table><thead><tr><th>Descripción</th><th>Estado</th></tr></thead><tbody>';
  S.filtered.forEach(r => {
    html += `<tr onclick="selRow('${r.id}')"><td>${r.texto||r.descripcion}</td><td>${badge(r.ok)}</td></tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}
function badge(v){ return `<span class="badge ${v==='OK'?'bOK':v==='Anulado'?'bAN':'bPE'}">${v||'Pendiente'}</span>`; }

// Inicio
loadLocal();
if(SURL) setInterval(pullCloud, 30000);
applyF();
if(!currentUser) document.getElementById('u-name').textContent = "Configurar Usuario";
</script>
</body>
